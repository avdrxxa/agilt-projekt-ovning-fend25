<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Player</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="app.js"></script>
</head>
<body>
    <nav>
        <div class="nav-top">
            <div class="hamburger" id="hamburger">&#9776;</div>
                <div class="nav-links" id="navLinks">
                    <a href="index.html">Home</a>
                    <a href="leaderboard.html">Leaderboard</a>
                </div>
            <a class="add" href="addplayer.html">Add Player</a>
            <input class="searchplayer" id="playerSearchInput" type="text" placeholder="Search by name or nickname">
            <ul id="searchResults"></ul>
        </div>
    </nav>
    <h1>Add Player</h1>
    <form id="playerForm">
        <input class="input" id="username" placeholder="Username" required>
        <input class="input" id="firstname" placeholder="First name" required>
        <input class="input" id="lastname" placeholder="Last name" required>
        <input class="input" id="age" type="number" placeholder="Age" required>
        <select class="input" id="country"></select>
        <select class="input" id="ranking">
            <option>Iron</option>
            <option>Bronze</option>
            <option>Silver</option>
            <option>Gold</option>
            <option>Diamond</option>
        </select>
        <br><br>
        <select class="input" id="teamSelect"></select>
        <br><br>
        <button>Add Player</button>
    </form>
    <p id="error"></p>
    <script>
        renderAddPlayer()
    </script>

</body>

</html>
