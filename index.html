<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>E-sports Tournament</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="app.js"></script>
</head>

<body>

<nav>
    <div class="nav-top">
        <div class="hamburger" id="hamburger">&#9776;</div>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="leaderboard.html">Leaderboard</a>
            </div>
        <a class="add" href="addplayer.html">Add Player</a>
        <input class="searchplayer" id="playerSearchInput" type="text" placeholder="Search by name or nickname">
        <ul id="searchResults"></ul>
    </div>
</nav>

    <h1>E-sports Tournament</h1>

    <div class="rename">
        <div class="rename-wrapper">
            <input class="input" id="teamAInput" placeholder="Rename Team A">
            <button onclick="renameTeam('A')">Rename</button>        
        </div>
        <div class="rename-wrapper">
            <input class="input" id="teamBInput" placeholder="Rename Team B">
            <button onclick="renameTeam('B')">Rename</button>
        </div>
    </div>

    <div class="sorting">
        <select id="sort">
            <option value="" selected disabled>None</option>
            <option value="ranking">Ranking: High to Low</option>
            <option value="age">Age: Low to High</option>
            <option value="username">Username: Alphabetical</option>
        </select>
    <button class="sortBtn" onclick="sortPlayers()">Sort</button>
    </div>
    

    <div class="teams">

        <div class="team">
            <h2 id="teamAName"></h2>
            <ul id="teamAList"></ul>
            <div class="statistik">
            </div>
        </div>

        <div class="team">
            <h2 id="teamBName"></h2>
            <ul id="teamBList"></ul>
            <div class="statistik2">
            </div>
        </div>

    </div>

    <script>
        renderHome()
    </script>

</body>

</html>
