<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>E-sports Tournament</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js"></script>
</head>

<body>

    <nav>
        <a href="index.html">Home</a>
        <a class="add" href="addplayer.html">Add Player</a>
    </nav>

    <h1>E-sports Tournament</h1>

    <div class="rename">
        <div class="rename-wrapper">
            <input class="input" id="teamAInput" placeholder="Rename Team A">
            <button onclick="renameTeam('A')">Rename</button>        
        </div>
        <div class="rename-wrapper">
            <input class="input" id="teamBInput" placeholder="Rename Team B">
            <button onclick="renameTeam('B')">Rename</button>
        </div>
    </div>

    <div class="sorting">
        <select id="sort">
            <option value="" selected disabled>None</option>
            <option value="ranking">Ranking: High to Low</option>
            <option value="age">Age: Low to High</option>
            <option value="username">Username: Alphabetical</option>
        </select>
    <button onclick="sortPlayers()">Sort</button>
    </div>
    

    <div class="teams">

        <div class="team">
            <h2 id="teamAName"></h2>
            <ul id="teamAList"></ul>
        </div>

        <div class="team">
            <h2 id="teamBName"></h2>
            <ul id="teamBList"></ul>
        </div>

    </div>

    <script>
        renderHome()
    </script>

</body>

</html>
